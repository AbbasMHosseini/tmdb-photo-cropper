<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMDB Photo Cropper</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var base = '/tmdb-photo-cropper';
        if (path.indexOf(base + '/') === 0) {
          sessionStorage.setItem('tmdb_cropper_redirect_path', path + window.location.search + window.location.hash);
          window.location.replace(base + '/');
        }
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
